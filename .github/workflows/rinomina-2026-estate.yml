name: Rinomina torneo 2026 in 2026-estate

on:
  workflow_dispatch:
    inputs:
      conferma:
        description: "Scrivi RINOMINA per confermare"
        required: true
        default: ""
      aggiorna_riferimenti:
        description: "Aggiorna anche tornei.json e index.html"
        required: true
        type: boolean
        default: true

permissions:
  contents: write

concurrency:
  group: rinomina-torneo-2026-estate
  cancel-in-progress: false

jobs:
  rinomina:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Controlli di sicurezza
        shell: bash
        run: |
          set -euo pipefail

          if [ "${{ github.event.inputs.conferma }}" != "RINOMINA" ]; then
            echo "Conferma non valida. Scrivi RINOMINA quando lanci il workflow."
            exit 1
          fi

          if [ ! -d "tornei/2026" ]; then
            echo "La cartella tornei/2026 non esiste. Nulla da rinominare."
            exit 1
          fi

          if [ -e "tornei/2026-estate" ]; then
            echo "La destinazione tornei/2026-estate esiste gia. Mi fermo per non sovrascrivere nulla."
            exit 1
          fi

      - name: Rinomina cartella
        shell: bash
        run: |
          set -euo pipefail
          git mv tornei/2026 tornei/2026-estate

      - name: Aggiorna riferimenti in tornei.json e index.html
        if: ${{ github.event.inputs.aggiorna_riferimenti == 'true' }}
        shell: bash
        run: |
          set -euo pipefail

          python3 <<'PY'
          import json
          from pathlib import Path

          # Aggiorna tornei.json in modo strutturato, se presente.
          json_path = Path("tornei.json")
          if json_path.exists():
              data = json.loads(json_path.read_text(encoding="utf-8"))
              tornei = data.get("tornei")

              if isinstance(tornei, list):
                  for torneo in tornei:
                      if not isinstance(torneo, dict):
                          continue

                      old_id = str(torneo.get("id", ""))
                      old_url = str(torneo.get("url", ""))
                      old_cartella = str(torneo.get("cartella", ""))

                      match = (
                          old_id == "2026"
                          or old_url.rstrip("/") == "tornei/2026"
                          or old_cartella.rstrip("/") == "tornei/2026"
                      )

                      if match:
                          torneo["id"] = "2026-estate"
                          torneo["anno"] = str(torneo.get("anno", "2026") or "2026")
                          torneo["stagione"] = torneo.get("stagione") or "Estate"
                          torneo["slug"] = "2026-estate"
                          torneo["cartella"] = "tornei/2026-estate"
                          torneo["url"] = "tornei/2026-estate/"
                          if "ordine" not in torneo or torneo.get("ordine") in (None, "", 0):
                              torneo["ordine"] = 20262
                          if "attivo" not in torneo:
                              torneo["attivo"] = True

              json_path.write_text(
                  json.dumps(data, ensure_ascii=False, indent=2) + "\n",
                  encoding="utf-8",
              )

          # Aggiorna solo la landing root, se contiene riferimenti diretti.
          index_path = Path("index.html")
          if index_path.exists():
              text = index_path.read_text(encoding="utf-8")
              text = text.replace("tornei/2026/", "tornei/2026-estate/")
              text = text.replace("tornei/2026\"", "tornei/2026-estate\"")
              text = text.replace("tornei/2026'", "tornei/2026-estate'")
              index_path.write_text(text, encoding="utf-8")
          PY

      - name: Mostra modifiche
        shell: bash
        run: |
          set -euo pipefail
          git status --short
          git diff --stat

      - name: Commit e push
        shell: bash
        run: |
          set -euo pipefail

          if git diff --quiet && git diff --cached --quiet; then
            echo "Nessuna modifica da committare."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add -A
          git commit -m "Rinomina torneo 2026 in 2026-estate"
          git push
