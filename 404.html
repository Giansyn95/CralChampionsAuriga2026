<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Pagina non trovata – CRAL Champions Auriga</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" type="image/png" href="tornei/2026-estate/immagini/logo_cral.png" />
  <link rel="apple-touch-icon" sizes="180x180" href="tornei/2026-estate/immagini/logo_cral.png" />
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Oswald:wght@600;700&family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root{
      --bg:#eef3f9; --panel:#fff; --ink:#142033; --muted:#667085; --line:#dbe5f2;
      --blue:#0f5aa8; --blue-soft:rgba(15,90,168,.11); --dark:#071d3a; --soft:#f3f7fc;
      --gold:#f5b942; --shadow:rgba(7,29,58,.10); --focus:#ffcf5a;
    }
    [data-theme="dark"]{
      --bg:#0d1520; --panel:#162033; --ink:#e2eaf5; --muted:#8fa4be; --line:#243450;
      --blue:#67a2ff; --blue-soft:rgba(103,162,255,.14); --dark:#0a1628; --soft:#1a2d47;
      --gold:#f5b942; --shadow:rgba(0,0,0,.35); --focus:#ffe08a;
    }
    *{box-sizing:border-box}
    html{scroll-behavior:smooth}
    body{margin:0;font-family:'Inter',Arial,Helvetica,sans-serif;background:var(--bg);color:var(--ink);transition:background .3s,color .3s;min-height:100vh;display:flex;flex-direction:column}
    a{color:inherit;text-decoration:none}
    button{font:inherit}
    :focus-visible{outline:3px solid var(--focus);outline-offset:3px}
    .wrap{width:min(720px,100%);margin:auto;padding:24px;flex:1;display:flex;flex-direction:column;justify-content:center}

    /* Hero — stesso stile della landing */
    .hero{position:relative;overflow:hidden;background:linear-gradient(135deg,var(--dark),#0f5aa8);color:#fff;border-radius:24px;padding:24px;margin-bottom:16px;box-shadow:0 14px 36px var(--shadow)}
    .hero::before{content:'';position:absolute;right:-80px;top:-80px;width:250px;height:250px;border-radius:50%;background:radial-gradient(circle,rgba(245,185,66,.32),transparent 68%);pointer-events:none}
    .hero::after{content:'';position:absolute;left:-70px;bottom:-95px;width:220px;height:220px;border-radius:50%;background:radial-gradient(circle,rgba(255,255,255,.08),transparent 70%);pointer-events:none}
    .hero-inner{position:relative;z-index:1;display:flex;gap:18px;align-items:center;justify-content:space-between;flex-wrap:wrap}
    .brand{display:flex;gap:16px;align-items:center;min-width:0}
    .hero-logo{width:68px;height:68px;border-radius:18px;background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.22);padding:6px;flex:0 0 auto;display:flex;align-items:center;justify-content:center;overflow:hidden}
    .hero-logo img{width:100%;height:100%;object-fit:contain;border-radius:12px}
    .hero-logo-fallback{font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:18px;font-weight:700;color:var(--gold);letter-spacing:.03em;display:none}
    .hero h1{margin:0;font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:clamp(24px,5vw,42px);font-weight:700;letter-spacing:.02em;line-height:1;text-transform:uppercase}
    .theme-btn{width:46px;height:46px;border:1px solid rgba(255,255,255,.28);border-radius:15px;background:rgba(255,255,255,.13);color:#fff;cursor:pointer;display:inline-flex;align-items:center;justify-content:center;font-size:20px;transition:background .15s,transform .15s;flex:0 0 auto}
    .theme-btn:hover{background:rgba(255,255,255,.22);transform:translateY(-1px)}

    /* Card 404 */
    .card-404{background:var(--panel);border:1px solid var(--line);border-radius:24px;padding:40px 32px;box-shadow:0 8px 22px var(--shadow);text-align:center}
    .num-404{font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:clamp(80px,18vw,140px);font-weight:700;line-height:1;color:var(--gold);letter-spacing:.02em;margin:0}
    .card-404 h2{margin:8px 0 12px;font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:clamp(20px,4vw,30px);font-weight:700;text-transform:uppercase;color:var(--blue);letter-spacing:.02em}
    .card-404 p{margin:0 0 28px;color:var(--muted);font-size:15px;line-height:1.6;max-width:460px;margin-left:auto;margin-right:auto}
    .primary-btn{display:inline-flex;align-items:center;justify-content:center;gap:8px;padding:13px 24px;border-radius:15px;border:0;background:linear-gradient(120deg,var(--gold),#ffe6a3);color:#071d3a;font-family:'Oswald',Arial,Helvetica,sans-serif;font-size:16px;font-weight:700;letter-spacing:.02em;text-decoration:none;cursor:pointer;box-shadow:0 10px 26px rgba(245,185,66,.30);transition:transform .16s,box-shadow .16s}
    .primary-btn:hover{transform:translateY(-2px);box-shadow:0 14px 32px rgba(245,185,66,.38)}

    footer{padding:16px 24px;color:var(--muted);font-size:13px;text-align:center}

    @media(max-width:480px){
      .card-404{padding:28px 18px}
      .hero-inner{flex-direction:column;align-items:flex-start;gap:12px}
      .theme-btn{align-self:flex-end}
    }
  </style>
</head>
<body>
  <div class="wrap">
    <header class="hero" role="banner">
      <div class="hero-inner">
        <div class="brand">
          <div class="hero-logo" aria-hidden="true">
            <img src="tornei/2026-estate/immagini/logo_cral.png" alt="" onerror="this.style.display='none';this.nextElementSibling.style.display='block'">
            <span class="hero-logo-fallback">CRAL</span>
          </div>
          <h1>CRAL Champions Auriga</h1>
        </div>
        <button class="theme-btn" id="btnTheme" type="button" title="Cambia tema" aria-label="Cambia tema chiaro/scuro">🌙</button>
      </div>
    </header>

    <main class="card-404" role="main">
      <p class="num-404" aria-label="Errore 404">404</p>
      <h2>Pagina non trovata</h2>
      <p>La pagina che cerchi non esiste o è stata spostata.<br>Torna alla home per vedere classifiche, risultati e calendario.</p>
      <a class="primary-btn" href="/CralChampionsAuriga/">⚽ Torna alla home</a>
    </main>
  </div>

  <footer>CRAL Champions Auriga &mdash; Torneo aziendale di calcio a 5</footer>

  <script>
    (function(){
      const saved = localStorage.getItem('cral_theme');
      const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
      const dark = saved ? saved === 'dark' : prefersDark;
      function applyTheme(isDark, save){
        document.documentElement.setAttribute('data-theme', isDark ? 'dark' : 'light');
        document.getElementById('btnTheme').textContent = isDark ? '☀️' : '🌙';
        document.getElementById('btnTheme').title = isDark ? 'Passa al tema chiaro' : 'Passa al tema scuro';
        if(save) localStorage.setItem('cral_theme', isDark ? 'dark' : 'light');
      }
      applyTheme(dark, false);
      document.getElementById('btnTheme').addEventListener('click', function(){
        applyTheme(document.documentElement.getAttribute('data-theme') !== 'dark', true);
      });
    })();
  </script>
</body>
</html>
